name: UI Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  ui-tests:
    name: Selenium UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: insider_automation_tests/requirements.txt

      - name: Install dependencies
        working-directory: insider_automation_tests
        run: pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Create output directories
        working-directory: insider_automation_tests
        run: mkdir -p reports screenshots

      - name: Run UI tests
        working-directory: insider_automation_tests
        env:
          CI: "true"
        run: |
          pytest \
            --browser=chrome \
            --headless \
            --junitxml=reports/junit.xml \
            -v

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: UI Test Results
          path: insider_automation_tests/reports/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report
          path: insider_automation_tests/reports/report.html
          retention-days: 14

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: insider_automation_tests/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment PR with report link
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ Passed' : '❌ Failed';
            const body = [
              `### ${status} — UI Tests`,
              '',
              `**Run:** [#${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `**Artifacts:** HTML report & screenshots uploaded (14-day retention).`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
