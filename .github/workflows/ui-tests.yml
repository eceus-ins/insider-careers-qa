name: UI Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  ui-tests:
    name: Selenium UI Tests (${{ matrix.project }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - insider_automation_tests
          - insider_career_tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.project }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Create output directories
        working-directory: ${{ matrix.project }}
        run: mkdir -p reports screenshots

      - name: Run UI tests
        working-directory: ${{ matrix.project }}
        env:
          CI: "true"
        run: |
          pytest \
            --browser=chrome \
            --html=reports/report.html \
            --self-contained-html \
            --junitxml=reports/junit.xml \
            -v \
            || true

      - name: Publish test results
        uses: dorny/tests-reporter@v1
        if: always()
        with:
          name: Test Results – ${{ matrix.project }}
          path: ${{ matrix.project }}/reports/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report-${{ matrix.project }}
          path: ${{ matrix.project }}/reports/report.html
          retention-days: 14

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ matrix.project }}
          path: ${{ matrix.project }}/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment PR with report link
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const { data: checks } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const project = '${{ matrix.project }}';
            const status = '${{ job.status }}' === 'success' ? '✅ Passed' : '❌ Failed';
            const body = [
              `### ${status} — UI Tests: \`${project}\``,
              '',
              `**Run:** [#${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `**Artifacts:** HTML report & screenshots uploaded (14-day retention).`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
